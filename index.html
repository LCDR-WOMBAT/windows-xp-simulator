<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="p" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="%23008080"/></pattern></defs><rect width="100" height="100" fill="%230066cc"/><rect width="100" height="100" fill="url(%23p)"/></svg>');
            background-attachment: fixed;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 11px;
            color: #000;
            overflow: hidden;
            user-select: none;
        }

        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: linear-gradient(to right, #0066cc, #00aaff);
            border-top: 1px solid #dfdfdf;
            display: flex;
            align-items: center;
            padding: 2px 2px;
            gap: 2px;
            z-index: 1000;
        }

        .start-button {
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 100%);
            border: 2px outset #dfdfdf;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 2px 6px;
            font-weight: bold;
            cursor: pointer;
            min-width: 50px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .start-button:active {
            border-style: inset;
        }

        .start-menu {
            position: fixed;
            bottom: 30px;
            left: 2px;
            width: 200px;
            background: linear-gradient(to right, #000080, #1084d7);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            display: none;
            z-index: 999;
            flex-direction: column;
        }

        .start-menu.active {
            display: flex;
        }

        .menu-item {
            padding: 4px 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-item:hover {
            background: #000080;
        }

        .menu-divider {
            height: 1px;
            background: #dfdfdf;
            margin: 2px 0;
        }

        .window {
            position: fixed;
            background: linear-gradient(to right, #000080, #1084d7);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            min-width: 200px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            box-shadow: 1px 1px 0 #dfdfdf inset, -1px -1px 0 #808080 inset, 2px 2px 5px rgba(0,0,0,0.3);
        }

        .window-title {
            background: linear-gradient(to right, #000080, #1084d7);
            color: #fff;
            padding: 2px 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
        }

        .window-buttons {
            display: flex;
            gap: 2px;
        }

        .window-btn {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 100%);
            border: 2px outset #dfdfdf;
            border-right-color: #808080;
            border-bottom-color: #808080;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .window-btn:active {
            border-style: inset;
        }

        .window-content {
            flex: 1;
            background: #c0c0c0;
            padding: 2px;
            overflow: hidden;
            color: #000;
        }

        .desktop-icon {
            position: fixed;
            width: 60px;
            text-align: center;
            cursor: pointer;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
            user-select: none;
        }

        .icon-image {
            width: 32px;
            height: 32px;
            margin: 0 auto 4px;
        }

        .desktop-icon:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .about-content {
            padding: 16px;
            background: #c0c0c0;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 11px;
        }

        .about-content h2 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .about-content p {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .text-input {
            background: #fff;
            border: 2px solid;
            border-color: #808080 #dfdfdf #dfdfdf #808080;
            padding: 2px 4px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 11px;
            color: #000;
        }

        .notepad-buttons {
            padding: 4px;
            display: flex;
            gap: 4px;
            justify-content: flex-end;
        }

        .button {
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 100%);
            border: 2px outset #dfdfdf;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 12px;
            cursor: pointer;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 11px;
        }

        .button:active {
            border-style: inset;
        }

        .clock {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 100%);
            border: 2px outset #dfdfdf;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 2px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="desktop-icon" style="top: 10px; left: 10px;" onclick="openWindow('about')">
        <div class="icon-image">💻</div>
        <div>My Computer</div>
    </div>

    <div class="desktop-icon" style="top: 80px; left: 10px;" onclick="openWindow('notepad')">
        <div class="icon-image">📄</div>
        <div>Notepad</div>
    </div>

    <div class="taskbar">
        <div class="start-button" onclick="toggleStartMenu()">🪟 Start</div>
        <div class="start-menu" id="startMenu">
            <div class="menu-item" onclick="openWindow('about')">📂 My Computer</div>
            <div class="menu-divider"></div>
            <div class="menu-item" onclick="openWindow('notepad')">📝 Notepad</div>
            <div class="menu-divider"></div>
            <div class="menu-item" onclick="alert('No internet access available')">🌐 Internet Explorer</div>
            <div class="menu-divider"></div>
            <div class="menu-item" onclick="shutDown()">🔴 Shut Down</div>
        </div>
        <div class="clock" id="clock"></div>
    </div>

    <script>
        let windows = {};
        let windowCounter = 0;

        function toggleStartMenu() {
            const menu = document.getElementById('startMenu');
            menu.classList.toggle('active');
        }

        function closeStartMenu() {
            document.getElementById('startMenu').classList.remove('active');
        }

        function openWindow(type) {
            closeStartMenu();
            windowCounter++;
            const id = `window-${windowCounter}`;
            const container = document.createElement('div');
            container.id = id;
            container.className = 'window';
            container.style.left = `${50 + windowCounter * 20}px`;
            container.style.top = `${50 + windowCounter * 20}px`;
            container.style.width = type === 'notepad' ? '400px' : '300px';
            container.style.height = type === 'notepad' ? '300px' : '200px';

            let title = '';
            let content = '';

            if (type === 'about') {
                title = 'My Computer';
                content = `
                    <div class="about-content">
                        <h2>Windows XP Simulator</h2>
                        <p><strong>Version:</strong> XP Service Pack 3</p>
                        <p><strong>Build:</strong> 2600</p>
                        <p><strong>Processor:</strong> Intel Pentium 4</p>
                        <p><strong>RAM:</strong> 512 MB</p>
                        <p>This is a nostalgic recreation of the classic Windows XP desktop experience.</p>
                    </div>
                `;
            } else if (type === 'notepad') {
                title = 'Untitled - Notepad';
                content = `
                    <textarea class="text-input" style="width: 100%; height: calc(100% - 40px); resize: none; border: none;"></textarea>
                    <div class="notepad-buttons">
                        <button class="button" onclick="document.getElementById('${id}').remove()">Close</button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="window-title">
                    <span>${title}</span>
                    <div class="window-buttons">
                        <button class="window-btn" onclick="minimizeWindow('${id}')">_</button>
                        <button class="window-btn" onclick="maximizeWindow('${id}')">🔲</button>
                        <button class="window-btn" onclick="document.getElementById('${id}').remove()">✕</button>
                    </div>
                </div>
                <div class="window-content">${content}</div>
            `;

            // Make window draggable
            const titleBar = container.querySelector('.window-title');
            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;

            titleBar.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - container.offsetLeft;
                offsetY = e.clientY - container.offsetTop;
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    container.style.left = `${e.clientX - offsetX}px`;
                    container.style.top = `${e.clientY - offsetY}px`;
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            document.body.appendChild(container);
            windows[id] = { minimized: false, maximized: false, originalStyle: {} };
        }

        function minimizeWindow(id) {
            const win = document.getElementById(id);
            if (windows[id].minimized) {
                win.style.display = 'flex';
                windows[id].minimized = false;
            } else {
                win.style.display = 'none';
                windows[id].minimized = true;
            }
        }

        function maximizeWindow(id) {
            const win = document.getElementById(id);
            if (windows[id].maximized) {
                win.style.left = windows[id].originalStyle.left;
                win.style.top = windows[id].originalStyle.top;
                win.style.width = windows[id].originalStyle.width;
                win.style.height = windows[id].originalStyle.height;
                windows[id].maximized = false;
            } else {
                windows[id].originalStyle = {
                    left: win.style.left,
                    top: win.style.top,
                    width: win.style.width,
                    height: win.style.height
                };
                win.style.left = '0';
                win.style.top = '0';
                win.style.width = 'calc(100% - 4px)';
                win.style.height = 'calc(100% - 32px)';
                windows[id].maximized = true;
            }
        }

        function updateClock() {
            const clock = document.getElementById('clock');
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function shutDown() {
            if (confirm('Are you sure you want to shut down Windows XP?')) {
                document.body.innerHTML = '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; font-size: 24px;">Shutting down... Goodbye!</div>';
                document.body.style.background = '#000';
            }
        }

        // Initialize
        updateClock();
        setInterval(updateClock, 1000);
        document.addEventListener('click', closeStartMenu);
    </script>
</body>
</html>
